<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0e1630"/>
  <!-- flow: task -> gear -> done -->
  <rect x="80" y="160" width="120" height="80" rx="14" fill="#172142" stroke="#2a3763" stroke-width="2"/>
  <rect x="100" y="182" width="80" height="9" rx="4.5" fill="#a7b1cc"/>
  <rect x="100" y="200" width="56" height="9" rx="4.5" fill="#a7b1cc"/>
  <rect x="100" y="218" width="68" height="9" rx="4.5" fill="#a7b1cc"/>

  <!-- arrow 1 -->
  <line x1="205" y1="200" x2="245" y2="200" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
  <polygon points="245,190 263,200 245,210" fill="#38bdf8"/>

  <!-- gear node -->
  <circle cx="320" cy="200" r="52" fill="#172142" stroke="#2a3763" stroke-width="2"/>
  <g fill="url(#g)">
    <circle cx="320" cy="200" r="20"/>
    <rect x="313" y="164" width="14" height="16" rx="4"/>
    <rect x="313" y="220" width="14" height="16" rx="4"/>
    <rect x="284" y="193" width="16" height="14" rx="4"/>
    <rect x="340" y="193" width="16" height="14" rx="4"/>
    <rect x="291" y="169" width="14" height="16" rx="4" transform="rotate(-45 298 177)"/>
    <rect x="335" y="215" width="14" height="16" rx="4" transform="rotate(-45 342 223)"/>
    <rect x="335" y="169" width="14" height="16" rx="4" transform="rotate(45 342 177)"/>
    <rect x="291" y="215" width="14" height="16" rx="4" transform="rotate(45 298 223)"/>
  </g>
  <circle cx="320" cy="200" r="9" fill="#172142"/>

  <!-- arrow 2 -->
  <line x1="380" y1="200" x2="420" y2="200" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
  <polygon points="420,190 438,200 420,210" fill="#38bdf8"/>

  <!-- done node -->
  <rect x="443" y="160" width="120" height="80" rx="14" fill="#172142" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="503" cy="200" r="24" fill="#4ade80"/>
  <polyline points="492,200 500,209 515,190" fill="none" stroke="#0e1630" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- repeat loop arrow underneath -->
  <path d="M503 262 q0 36 -91 36 h-184 q-88 0 -88 -34" fill="none" stroke="#2a3763"
        stroke-width="4" stroke-dasharray="10 10" stroke-linecap="round"/>
  <polygon points="130,270 140,252 150,270" fill="#2a3763"/>
</svg>
