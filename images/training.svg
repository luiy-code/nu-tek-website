<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0e1630"/>

  <!-- presentation board -->
  <rect x="150" y="62" width="300" height="190" rx="14" fill="#172142" stroke="#2a3763" stroke-width="2.5"/>
  <rect x="290" y="252" width="20" height="30" fill="#2a3763"/>
  <line x1="240" y1="316" x2="300" y2="282" stroke="#2a3763" stroke-width="8" stroke-linecap="round"/>
  <line x1="360" y1="316" x2="300" y2="282" stroke="#2a3763" stroke-width="8" stroke-linecap="round"/>

  <!-- simple lesson chart on the board -->
  <rect x="180" y="180" width="28" height="44" rx="6" fill="#38bdf8"/>
  <rect x="222" y="156" width="28" height="68" rx="6" fill="url(#g)"/>
  <rect x="264" y="132" width="28" height="92" rx="6" fill="#38bdf8"/>
  <polyline points="322,196 356,160 392,172 420,120" fill="none" stroke="#4ade80" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="420" cy="120" r="7" fill="#4ade80"/>
  <rect x="180" y="86" width="130" height="12" rx="6" fill="#a7b1cc"/>

  <!-- instructor with pointer -->
  <circle cx="480" cy="222" r="26" fill="url(#g)"/>
  <path d="M436 316 q0 -52 44 -52 q44 0 44 52z" fill="url(#g)"/>
  <line x1="466" y1="252" x2="428" y2="196" stroke="#eef2ff" stroke-width="6" stroke-linecap="round"/>

  <!-- two learners -->
  <circle cx="120" cy="296" r="20" fill="#2a3763"/>
  <path d="M88 352 q0 -38 32 -38 q32 0 32 38z" fill="#2a3763"/>
  <circle cx="196" cy="296" r="20" fill="#2a3763"/>
  <path d="M164 352 q0 -38 32 -38 q32 0 32 38z" fill="#2a3763"/>
</svg>
